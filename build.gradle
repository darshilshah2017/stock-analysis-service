plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.0'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.github.screener'
version = '1.0-SNAPSHOT'

ext {
    SPRING_BOOT_VERSION = '3.5.0'
}

springBoot {
    mainClass = 'com.github.screener.StockAnalysisApplication'
}

allprojects {
    repositories {
        mavenCentral()
    }
}